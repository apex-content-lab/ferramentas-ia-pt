<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Ferramentas IA</title>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.7; color: #333; margin: 0; }
        header { background: #1a1a2e; color: white; padding: 1rem 2rem; }
        header a { color: #e94560; text-decoration: none; font-weight: bold; }
        .container { max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; }
        h1 { color: #1a1a2e; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        textarea { height: 150px; resize: vertical; }
        .btn { background: #e94560; color: white; padding: 0.75rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header><a href="/">🤖 Ferramentas IA</a></header>
    <div class="container">
        <h1>Contato</h1>
        <p>Tem alguma dúvida ou sugestão? Preencha o formulário abaixo.</p>
        <form action="https://formspree.io/f/placeholder" method="POST">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Mensagem</label>
                <textarea name="message" required></textarea>
            </div>
            <button type="submit" class="btn">Enviar Mensagem</button>
        </form>
    </div>
    <footer>© 2025 Ferramentas IA</footer>
</body>
</html>
